name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android
        run: |
          npx cap init "ExamMaker" "com.nikzadfard.exammaker" --web-dir=dist
          npx cap add android
          npx cap sync

      - name: Fix Java Version in Gradle
        run: |
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i 's/sourceCompatibility = JavaVersion.VERSION_21/sourceCompatibility = JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i 's/targetCompatibility = JavaVersion.VERSION_21/targetCompatibility = JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i 's/jvmTarget = "21"/jvmTarget = "17"/g' android/app/build.gradle

      - name: Fix Kotlin Duplicates
        run: |
          cat >> android/build.gradle << 'EOF'
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
                  }
              }
          }
          EOF

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: exam-maker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
