name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
         

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Build React Web App
      - name: Build React App
        run: npm run build

      # 5. Setup Java (Required for Android build)
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 6. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7. Initialize Capacitor Android Project
      - name: Initialize Capacitor Android
        run: |
          npx cap init "طراحی آزمون نیکزاد" "com.nikzadfard.exammaker" --web-dir=dist
          npx cap add android
          npx cap sync

      # 8. Build Android APK using Gradle
      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 9. Upload APK as Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: exam-maker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
